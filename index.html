<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora FQ4</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="topo">
        <h1>Calculadora de Economia FQ4</h1>
        <img src="logo-fq4.png" alt="FQ4">
    </div>
</header>

<div class="container">

    <div class="card">

        <label>Consumo Mensal de Diesel (Litros)</label>

        <input type="number" id="consumo" placeholder="Ex: 40000">

        <button onclick="calcular()">CALCULAR ECONOMIA</button>

    </div>

    <div class="resultado">

        <h2>Resultado</h2>

        <div class="linha">
            <span>Investimento em FQ4</span>
            <strong id="investimento">-</strong>
        </div>

        <div class="linha">
            <span>Economia Estimada</span>
            <strong id="economia">-</strong>
        </div>

        <div class="linha">
            <span>Retorno Líquido</span>
            <strong id="retorno">-</strong>
        </div>

        <div class="linha">
            <span>ROI</span>
            <strong id="roi">-</strong>
        </div>

        <div class="linha destaque">
            <span>Economia Anual</span>
            <strong id="anual">-</strong>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
