<!DOCTYPE html>
<html>
<head>
    <title>Calculadora FQ4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family: Arial; max-width: 600px; margin: auto; padding: 20px;">

<h1>Calculadora de Economia FQ4</h1>

<label>Consumo mensal de diesel (L):</label>
<br><br>

<input type="number" id="diesel" placeholder="Ex: 40000" style="width:100%; padding:10px;">

<br><br>

<button onclick="calcular()" style="padding:10px 20px;">
Calcular
</button>

<hr>

<div id="resultado"></div>

<script>
function calcular() {

    let diesel = Number(document.getElementById("diesel").value);

    let fq4 = diesel / 1000;
    let custoFQ4 = fq4 * 165;
    let gastoDiesel = diesel * 7;
    let economia = gastoDiesel * 0.03;
    let ganho = economia - custoFQ4;

    document.getElementById("resultado").innerHTML = `
        <h2>Resultado</h2>

        <p><b>Consumo FQ4:</b> ${fq4.toFixed(1)} L</p>

        <p><b>Investimento em FQ4:</b>
        R$ ${custoFQ4.toLocaleString('pt-BR')}</p>

        <p><b>Gasto com Diesel:</b>
        R$ ${gastoDiesel.toLocaleString('pt-BR')}</p>

        <p><b>Economia mínima (3%):</b>
        R$ ${economia.toLocaleString('pt-BR')}</p>

        <p><b>Ganho Líquido:</b>
        R$ ${ganho.toLocaleString('pt-BR')}</p>
    `;
}
</script>

</body>
</html>
