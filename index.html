<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Economia FQ4</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="topo">
        <h1>Calculadora de Economia FQ4</h1>
        <img src="logo-fq4.png" alt="Logo FQ4">
    </div>
</header>

<div class="container">

    <div class="card">

        <label>Preço do Diesel (R$/L)</label>
        <input type="number" id="diesel" value="7">

        <label>Volume de Diesel (Litros)</label>
        <input type="number" id="volume" value="40000">

        <label>Economia Esperada (%)</label>
        <input type="number" id="economia" value="3">

        <label>Dosagem FQ4 (ml/L)</label>
        <input type="number" id="dosagem" value="1">

        <label>Preço da Bombona 20L (R$)</label>
        <input type="number" id="bombona" value="3300">

        <button onclick="calcular()">
            CALCULAR ECONOMIA
        </button>

    </div>

    <div class="resultado" id="resultado">

        <h2>Resultado</h2>

        <div class="linha">
            <span>Litros de FQ4 Necessários</span>
            <strong id="fq4"></strong>
        </div>

        <div class="linha">
            <span>Investimento FQ4</span>
            <strong id="investimento"></strong>
        </div>

        <div class="linha">
            <span>Economia Estimada</span>
            <strong id="economiaTotal"></strong>
        </div>

        <div class="linha destaque">
            <span>Retorno Líquido</span>
            <strong id="retorno"></strong>
        </div>

    </div>

</div>

<footer>
    FQ4 • Filtro Químico de Combustível Diesel
</footer>

<script src="script.js"></script>

</body>
</html>
