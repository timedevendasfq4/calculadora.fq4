<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Economia FQ4</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#eef2f5;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.08);
}

.logo{
text-align:center;
font-size:38px;
font-weight:bold;
color:#003366;
margin-bottom:10px;
}

.subtitulo{
text-align:center;
color:#666;
margin-bottom:30px;
}

label{
font-weight:bold;
}

input{
width:100%;
padding:15px;
font-size:20px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:15px;
margin-top:20px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#003366;
color:white;
font-weight:bold;
}

button:hover{
background:#004c99;
}

.resultado{
margin-top:30px;
}

.card{
background:#f8f8f8;
padding:18px;
margin-bottom:12px;
border-radius:12px;
border-left:6px solid #003366;
}

.destaque{
background:#dff5e1;
border-left:6px solid #2e7d32;
font-size:22px;
}

.economia-anual{
background:#2e7d32;
color:white;
text-align:center;
padding:25px;
border-radius:15px;
margin-bottom:20px;
}

.economia-anual h2{
font-size:18px;
margin-bottom:10px;
}

.economia-anual h1{
font-size:42px;
}

.explicacao{
background:#fff8dc;
border-left:6px solid #d4a017;
padding:20px;
border-radius:12px;
margin-top:15px;
}

.whatsapp{
display:block;
text-align:center;
background:#25D366;
color:white;
text-decoration:none;
padding:18px;
border-radius:10px;
font-size:20px;
font-weight:bold;
margin-top:20px;
}

.rodape{
margin-top:30px;
text-align:center;
color:#666;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
FQ4
</div>

<p class="subtitulo">
Calculadora de Economia e Consumo de FQ4 Diesel
</p>

<label>Consumo Mensal de Diesel (Litros)</label>

<input
type="number"
id="diesel"
placeholder="Exemplo: 40000">

<button onclick="calcular()">
CALCULAR ECONOMIA
</button>

<div id="resultado" class="resultado"></div>

</div>

<script>

function calcular(){

let diesel = parseFloat(document.getElementById('diesel').value);

if(!diesel){
alert("Informe o consumo mensal de diesel.");
return;
}

const precoDiesel = 7.00;
const precoFQ4 = 165.00;

let gastoDiesel = diesel * precoDiesel;

let consumoFQ4 = diesel * 0.001;

let custoFQ4 = consumoFQ4 * precoFQ4;

let economia = gastoDiesel * 0.03;

let ganhoLiquido = economia - custoFQ4;

let economiaAnual = ganhoLiquido * 12;

let roi = (ganhoLiquido / custoFQ4) * 100;

document.getElementById("resultado").innerHTML = `

<div class="economia-anual">

<h2>ECONOMIA ANUAL ESTIMADA</h2>

<h1>
R$ ${economiaAnual.toLocaleString('pt-BR',{minimumFractionDigits:2})}
</h1>

</div>

<div class="card">
🚛 <strong>Investimento Mensal em Diesel</strong><br>
R$ ${gastoDiesel.toLocaleString('pt-BR',{minimumFractionDigits:2})}
</div>

<div class="card">
💧 <strong>Necessidade Mensal de FQ4</strong><br>
${consumoFQ4.toFixed(1)} litros
</div>

<div class="card">
💰 <strong>Investimento Mensal em FQ4</strong><br>
R$ ${custoFQ4.toLocaleString('pt-BR',{minimumFractionDigits:2})}
</div>

<div class="card">
📉 <strong>Economia Mínima Estimada (3%)</strong><br>
R$ ${economia.toLocaleString('pt-BR',{minimumFractionDigits:2})}
</div>

<div class="card destaque">
✅ <strong>Ganho Líquido Mensal Estimado</strong><br>
R$ ${ganhoLiquido.toLocaleString('pt-BR',{minimumFractionDigits:2})}
</div>

<div class="card destaque">
🎯 <strong>ROI Estimado</strong><br>
${roi.toFixed(1)}%
</div>

<div class="explicacao">

<h3>📋 Como utilizar o FQ4</h3>

<br>

<p>
<strong>Primeira Aplicação (Choque):</strong><br>
Aplicar 2 ml de FQ4 para cada litro de diesel tratado.
</p>

<br>

<p>
<strong>Tratamento Contínuo:</strong><br>
Após a limpeza inicial, utilizar 1 ml de FQ4 para cada litro de diesel abastecido.
</p>

<br>

<p>
O FQ4 atua na descontaminação do diesel, removendo água, fungos, bactérias, borra e impurezas, protegendo filtros, bombas e bicos injetores.
</p>

<br>

<p>
Os valores apresentados são estimativas baseadas em uma economia mínima de 3% e diesel a R$ 7,00 por litro.
</p>

</div>

<a class="whatsapp"
href="https://wa.me/5519971253456?text=Olá,%20fiz%20a%20simulação%20na%20calculadora%20FQ4%20e%20gostaria%20de%20mais%20informações."
target="_blank">

📲 SOLICITAR ORÇAMENTO

</a>

<div class="rodape">

FQ4 – Filtro Químico de Combustível Diesel<br>

Remove água, fungos, bactérias, borra e impurezas, aumentando a vida útil dos componentes e reduzindo custos operacionais.

</div>

`;

}

</script>

</body>
</html>
